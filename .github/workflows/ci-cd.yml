name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Config Service (Python / pytest) ────────────────────────────────────────
  test-config:
    name: Config Service Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            services/config/requirements.txt
            services/config/tests/requirements-test.txt

      - name: Install dependencies
        run: |
          pip install -r services/config/requirements.txt
          pip install -r services/config/tests/requirements-test.txt

      - name: Run tests
        run: pytest
        working-directory: services/config

  # ── UI (Vitest) ─────────────────────────────────────────────────────────────
  test-ui:
    name: UI Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ui

      - name: Run tests
        run: npm test
        working-directory: ui

  # ── Module Backends (Vitest, one job per module) ─────────────────────────────
  test-modules:
    name: Module Tests (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [clock, weather, calendar, rss, system-stats, sticky-notes]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: modules/${{ matrix.module }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: modules/${{ matrix.module }}

      - name: Run tests
        run: npm test
        working-directory: modules/${{ matrix.module }}

  # ── Deploy (self-hosted Pi runner, main branch only) ─────────────────────────
  deploy:
    name: Deploy to Raspberry Pi
    needs: [test-config, test-ui, test-modules]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: [self-hosted, pi]
    steps:
      - name: Pull latest code and redeploy
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          cd "${DEPLOY_PATH:-/opt/ozmirror}"
          git pull origin main
          make deploy
