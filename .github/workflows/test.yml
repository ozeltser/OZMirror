name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Config Service — pytest with in-memory SQLite
  # ──────────────────────────────────────────────────────────────────────────
  config-service:
    name: Config Service (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/config

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            services/config/requirements.txt
            services/config/tests/requirements-test.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r tests/requirements-test.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ──────────────────────────────────────────────────────────────────────────
  # Clock module — Vitest (Node environment)
  # ──────────────────────────────────────────────────────────────────────────
  clock-module:
    name: Clock Module (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: modules/clock

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: modules/clock/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ──────────────────────────────────────────────────────────────────────────
  # UI — Vitest + React Testing Library (jsdom environment)
  # ──────────────────────────────────────────────────────────────────────────
  ui:
    name: UI (Vitest + RTL)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
